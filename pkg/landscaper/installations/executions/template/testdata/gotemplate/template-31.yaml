- name: one
  type: GoTemplate
  template: |
    deployItems:
    - name: schema-version-specific
      type: landscaper.gardener.cloud/mock
      config:
        name: {{ .cd.metadata.name }}
        names:
        {{- range $_, $cd := .components }}
          - name: {{ $cd.metadata.name }}
        {{- end }}