{{- if .Values.landscaper.registryConfig.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "landscaper.fullname" . }}-registry
  labels:
    {{- include "landscaper.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.landscaper.registryConfig.secrets }}
  {{ $key }}: {{ toJson $value | b64enc }}
  {{- end }}
{{- end }}
