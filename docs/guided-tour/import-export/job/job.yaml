apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-job-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: my-job-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: my-job-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: my-job-sa
    namespace: default
roleRef:
  kind: Role
  name: my-job-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: my-job-sa
      containers:
        - name: kubectl-container
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              kubectl create configmap my-exports \
                --from-literal=username="$(cat /etc/secret/first) $(cat /etc/secret/world)" \
                --namespace=default
          volumeMounts:
            - name: secret-volume
              mountPath: /etc/secret
              readOnly: true
      volumes:
        - name: secret-volume
          secret:
            secretName: my-imports
